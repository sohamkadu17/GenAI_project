<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FitBuddy â€“ Start Your Journey</title>

  <!-- Google Fonts â€“ Roboto -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet" />

  <style>
    /* â”€â”€ RESET & BASE â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Roboto', sans-serif;
      min-height: 100vh;
      color: #e2e8f0;
      background-color: #0f0c1d;
      background-image:
        url('/static/images/gym-bg.jpg'),
        linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #1a1a2e 100%);
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      background-blend-mode: overlay;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 16px;
    }

    /* â”€â”€ PAGE WRAPPER â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
    .page-wrapper {
      width: 100%;
      max-width: 560px;
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    /* â”€â”€ LOGO HEADER â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
    .logo-header {
      text-align: center;
    }
    .logo-icon { font-size: 56px; line-height: 1; margin-bottom: 10px; }
    .logo-title {
      font-size: 2.6rem;
      font-weight: 900;
      letter-spacing: -1px;
      background: linear-gradient(90deg, #818cf8, #34d399);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .logo-sub { font-size: 0.95rem; color: #94a3b8; margin-top: 6px; font-weight: 300; }

    /* â”€â”€ FORM CARD â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
    .card {
      background: rgba(15, 15, 30, 0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 20px;
      padding: 36px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.5);
    }
    .card-title {
      font-size: 1.05rem;
      font-weight: 700;
      color: #c7d2fe;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      letter-spacing: 0.3px;
    }

    /* â”€â”€ FORM LAYOUT â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
    form { display: flex; flex-direction: column; gap: 18px; }

    .field { display: flex; flex-direction: column; gap: 6px; }

    .field-row {
      display: flex;
      gap: 14px;
    }
    .field-row .field { flex: 1; }

    /* â”€â”€ LABELS â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
    label {
      font-size: 0.8rem;
      font-weight: 500;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }
    label .hint {
      font-weight: 300;
      font-size: 0.75rem;
      text-transform: none;
      color: #4b5563;
      letter-spacing: 0;
    }

    /* â”€â”€ INPUTS & SELECTS â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
    input[type="text"],
    input[type="number"],
    select {
      width: 100%;
      background: rgba(255,255,255,0.045);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 10px 16px;
      font-family: 'Roboto', sans-serif;
      font-size: 0.95rem;
      color: #e2e8f0;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input::placeholder { color: #4b5563; }
    input:focus, select:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99,102,241,0.18);
    }
    select { cursor: pointer; }
    select option { background: #1e1b38; color: #e2e8f0; }

    /* â”€â”€ INTENSITY PILLS â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
    .pill-group {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .pill {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 22px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.04);
      color: #94a3b8;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      user-select: none;
      transition: border-color 0.2s, background 0.2s, color 0.2s;
    }
    .pill:hover { border-color: #818cf8; color: #c7d2fe; }
    .pill.selected {
      border-color: #6366f1;
      background: rgba(99,102,241,0.22);
      color: #c7d2fe;
      box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
    }
    .pill input { display: none; }

    /* â”€â”€ SUBMIT BUTTON â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
    .btn-primary {
      width: 100%;
      padding: 13px;
      margin-top: 6px;
      background: linear-gradient(135deg, #4f46e5, #6366f1);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-family: 'Roboto', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.3px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(99,102,241,0.35);
    }
    .btn-primary:hover {
      background: linear-gradient(135deg, #4338ca, #4f46e5);
      transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(99,102,241,0.45);
    }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    /* â”€â”€ SPINNER â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.25);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    .spinner.visible { display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* â”€â”€ ADMIN LINK â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
    .admin-link {
      text-align: center;
      font-size: 0.85rem;
      color: #4b5563;
    }
    .admin-link a {
      color: #818cf8;
      text-decoration: none;
      font-weight: 500;
    }
    .admin-link a:hover { text-decoration: underline; }

    /* â”€â”€ RESPONSIVE â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
    @media (max-width: 480px) {
      body { padding: 24px 12px; align-items: flex-start; }
      .card { padding: 24px 18px; }
      .logo-title { font-size: 2rem; }
      .field-row { flex-direction: column; gap: 18px; }
      .pill { padding: 9px 16px; font-size: 0.85rem; }
    }
  </style>
</head>
<body>

  <div class="page-wrapper">

    <!-- â”€â”€ LOGO HEADER â”€â”€ -->
    <header class="logo-header" role="banner">
      <div class="logo-icon" aria-hidden="true">&#x1F4AA;</div>
      <h1 class="logo-title">FitBuddy</h1>
      <p class="logo-sub">AI-powered personal trainer &mdash; get your 7-day plan in seconds.</p>
    </header>

    <!-- â”€â”€ FORM CARD â”€â”€ -->
    <main>
      <div class="card" role="main">
        <p class="card-title">Tell us about yourself</p>

        <form action="/generate-workout" method="post" id="genForm" novalidate>

          <!-- Full Name -->
          <div class="field">
            <label for="username">Full Name</label>
            <input id="username" name="username" type="text"
                   placeholder="e.g. Alex Johnson" required autocomplete="name" />
          </div>

          <!-- User ID -->
          <div class="field">
            <label for="user_id">User ID <span class="hint">(unique identifier)</span></label>
            <input id="user_id" name="user_id" type="text"
                   placeholder="e.g. alex_42 or U-00123" required />
          </div>

          <!-- Age & Weight -->
          <div class="field-row">
            <div class="field">
              <label for="age">Age</label>
              <input id="age" name="age" type="number"
                     min="10" max="100" placeholder="25" required />
            </div>
            <div class="field">
              <label for="weight">Weight <span class="hint">(kg)</span></label>
              <input id="weight" name="weight" type="number"
                     step="0.1" min="30" placeholder="70" required />
            </div>
          </div>

          <!-- Fitness Goal -->
          <div class="field">
            <label for="goal">Fitness Goal</label>
            <select id="goal" name="goal" required>
              <option value="" disabled selected>Select your goal&hellip;</option>
              <option value="Weight Loss">&#x1F525; Weight Loss</option>
              <option value="Muscle Gain">&#x1F4AA; Muscle Gain</option>
              <option value="Improve Endurance">&#x1F3C3; Improve Endurance</option>
              <option value="General Fitness">&#x26A1; General Fitness</option>
              <option value="Flexibility &amp; Mobility">&#x1F9D8; Flexibility &amp; Mobility</option>
            </select>
          </div>

          <!-- Training Intensity -->
          <div class="field">
            <label>Training Intensity</label>
            <div class="pill-group" id="intensityGroup" role="group" aria-label="Training Intensity">
              <label class="pill" data-val="low" aria-label="Low intensity">
                <input type="radio" name="intensity" value="low" required />
                &#x1F422; Low
              </label>
              <label class="pill" data-val="medium" aria-label="Medium intensity">
                <input type="radio" name="intensity" value="medium" />
                &#x1F6B6; Medium
              </label>
              <label class="pill" data-val="high" aria-label="High intensity">
                <input type="radio" name="intensity" value="high" />
                &#x1F525; High
              </label>
            </div>
          </div>

          <!-- Submit -->
          <button type="submit" class="btn-primary" id="submitBtn">
            <span id="btnLabel">Generate My Plan &#x2728;</span>
            <span class="spinner" id="btnSpinner" aria-hidden="true"></span>
          </button>

        </form>
      </div>
    </main>

    <!-- â”€â”€ ADMIN LINK â”€â”€ -->
    <p class="admin-link">
      Admin? <a href="/view-all-users">View all users &rarr;</a>
    </p>

  </div>

  <script>
    /* â”€â”€ Intensity pill toggle â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
    document.querySelectorAll('.pill').forEach(function(pill) {
      pill.addEventListener('click', function() {
        document.querySelectorAll('.pill').forEach(function(p) { p.classList.remove('selected'); });
        pill.classList.add('selected');
        pill.querySelector('input').checked = true;
      });
    });

    /* â”€â”€ Loading state on submit â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
    document.getElementById('genForm').addEventListener('submit', function(e) {
      var allFilled = this.username.value.trim() &&
                      this.user_id.value.trim() &&
                      this.age.value &&
                      this.weight.value &&
                      this.goal.value &&
                      document.querySelector('input[name="intensity"]:checked');
      if (!allFilled) {
        e.preventDefault();
        alert('Please fill in all fields and select a training intensity.');
        return;
      }
      document.getElementById('btnLabel').textContent = 'Generating\u2026';
      document.getElementById('btnSpinner').classList.add('visible');
      document.getElementById('submitBtn').disabled = true;
    });
  </script>
</body>
</html>
